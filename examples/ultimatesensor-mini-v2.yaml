# UltimateSensor Mini V2 LD2460 tracking package example.
# Use this when LD2460 replaces LD2450 on the same UART pins.

substitutions:
  ld2460_tx_pin: GPIO18
  ld2460_rx_pin: GPIO19

packages:
  tracking:
    url: https://github.com/smarthomeshop/ld2460
    ref: v0.1.0
    files:
      - tracking-ld2460.yaml
    refresh: 1d
